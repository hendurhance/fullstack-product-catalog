name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.4"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: product_catalog_testing
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d product_catalog_testing"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_pgsql, redis, intl, bcmath, zip
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

      - run: composer install --prefer-dist --no-interaction --no-progress

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            vendor/bin/phpstan analyse --memory-limit=1G
          else
            echo "phpstan config not present yet — skipping"
          fi

      - name: Tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: product_catalog_testing
          DB_USERNAME: app
          DB_PASSWORD: app
          CACHE_STORE: redis
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REVALIDATION_SECRET: test-ci-secret
          REVALIDATION_URL: http://127.0.0.1:3000/api/revalidate
        run: php artisan test

  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["22"]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Tests
        run: |
          if grep -q '"test"' package.json; then
            npm test -- --run || npm test
          else
            echo "test runner not wired yet — skipping"
          fi

  contract-drift:
    name: OpenAPI ↔ TypeScript drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Generate types from OpenAPI
        run: npm run types

      - name: Typecheck after regeneration
        run: npx tsc --noEmit
