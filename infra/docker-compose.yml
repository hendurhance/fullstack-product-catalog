name: product-catalog

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-product_catalog}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-base64:8tIjEAxhtxBkUL/QM5EsybCZVehuT1NgHdrwBhtvQ/Q=}
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DB:-product_catalog}
      DB_USERNAME: ${MYSQL_USER:-app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-app}
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REVALIDATION_SECRET: ${REVALIDATION_SECRET:-dev-only-secret}
      REVALIDATION_URL: http://frontend:3000/api/revalidate
    volumes:
      - ../backend:/app
    working_dir: /app
    command: sh -lc "composer install --no-interaction --prefer-dist && php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      INTERNAL_API_URL: http://backend:8000/api/v1
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-dev-only-secret}
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
      - ../backend/api.json:/app/.openapi.json:ro
    working_dir: /app
    command: sh -lc "[ -d node_modules ] && [ -n \"$(ls -A node_modules)\" ] || npm ci; npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
  frontend_node_modules:
  frontend_next:
